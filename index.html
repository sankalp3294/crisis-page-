<!DOCTYPE html>
<html>
<head>
<title>CrisisLink</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">
<div class="card">

<h1>CrisisLink Emergency Portal</h1>
<p>Instant emergency reporting for hospitality venues.</p>

<form action="/submit" method="POST">

<input type="text" name="name" placeholder="Guest Name" required>

<input type="text" name="room" placeholder="Room Number" required>

<select name="type">
<option>Fire</option>
<option>Medical</option>
<option>Security</option>
<option>Flood</option>
</select>

<textarea name="description" placeholder="Describe issue"></textarea>

<button type="submit">Raise Alert</button>

</form>

</div>
</div>

</body>
</html>
